version: "3.8"

services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: udagram
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./udagram-api
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: udagram
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: password
      JWT_SECRET: udagram-jwt-secret
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./udagram-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
