<ion-header>
  <ion-toolbar>
    <ion-title>Udagram</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>{{ isRegister ? 'Create Account' : 'Login' }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input type="password" [(ngModel)]="password"></ion-input>
      </ion-item>

      <div *ngIf="error" class="ion-padding-top">
        <ion-text color="danger">{{ error }}</ion-text>
      </div>

      <ion-button expand="block" class="ion-margin-top" (click)="submit()">
        {{ isRegister ? 'Register' : 'Login' }}
      </ion-button>

      <ion-button expand="block" fill="clear" (click)="toggleMode()">
        {{ isRegister ? 'Already have an account? Login' : 'No account? Register' }}
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
