<ion-header>
  <ion-toolbar>
    <ion-title>Udagram Feed</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">Logout</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-content>
      <ion-item>
        <ion-label position="floating">Caption</ion-label>
        <ion-input [(ngModel)]="newCaption"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Image URL</ion-label>
        <ion-input [(ngModel)]="newUrl"></ion-input>
      </ion-item>
      <ion-button expand="block" class="ion-margin-top" (click)="addPost()">
        Add Post
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-card *ngFor="let item of items">
      <img [src]="item.url" *ngIf="item.url" />
      <ion-card-header>
        <ion-card-title>{{ item.caption }}</ion-card-title>
        <ion-card-subtitle>{{ item.createdAt | date }}</ion-card-subtitle>
      </ion-card-header>
    </ion-card>
  </ion-list>

  <ion-item *ngIf="items.length === 0">
    <ion-label class="ion-text-center">No posts yet. Be the first!</ion-label>
  </ion-item>
</ion-content>
